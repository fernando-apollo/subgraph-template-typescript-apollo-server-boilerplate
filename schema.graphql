directive @contact(
  "Contact title of the subgraph owner"
  name: String!
  "URL where the subgraph's owner can be reached"
  url: String
  "Other relevant notes can be included here; supports markdown links"
  description: String
) on SCHEMA

extend schema
  @contact(
    name: "Subgraph Team"
    url: "https://myteam.slack.com/archives/teams-chat-room-url"
    description: "send urgent issues to [#oncall](https://yourteam.slack.com/archives/oncall)."
  )
  @link(
    url: "https://specs.apollo.dev/federation/v2.13",
    import: [
      "@key", "@shareable", "@external", "@requires",
      "@authenticated", "@requiresScopes",
      "@cost", "@listSize"
    ]
  )

enum CacheControlScope {
  PUBLIC
  PRIVATE
}

directive @cacheControl(
  maxAge: Int
  scope: CacheControlScope
  inheritMaxAge: Boolean
) on FIELD_DEFINITION | OBJECT | INTERFACE | UNION

type Query {
  "Get a product by ID"
  product(id: ID!): Product @cacheControl(maxAge: 60)
  "Get all products"
  products(first: Int = 10): [Product!]! @listSize(assumedSize: 10, slicingArguments: ["first"]) @cacheControl(maxAge: 30)
}

type Mutation {
  "Create a new product (requires authentication)"
  createProduct(input: CreateProductInput!): Product! @authenticated
}

"""
A product in the catalog.
This is an entity that can be resolved across subgraphs.
"""
type Product @key(fields: "id") @cost(weight: 2) {
  id: ID!
  name: String!
  price: Float!
  inStock: Boolean!
}

input CreateProductInput {
  name: String!
  price: Float!
  inStock: Boolean
}
